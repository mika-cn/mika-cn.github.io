<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaoXian Web Clipper</title>
    <link rel="icon" type="image/png" href="imgs/logo.png" />
    <style>
       body { margin: 0px; }
      .main {
        padding: 20px 20px 200px 20px;
        background-color: #666;
        color: #f5f5f5;
      }
      .screenshot {
        margin-bottom: 100px;
      }
      .screenshot > img {
        max-width: 100%;
      }
      .screenshot > h3 {
        border-bottom: solid 1px #ccc
      }
    </style>
  </head>
  <body>
    <div class="main">
      <center><h1>MaoXian Web Clipper screenshots</h1></center>
      <div class="screenshot">
        <h3>Free mode (自由选择模式)</h3>
        <img src="imgs/mx-wc-free-mode.png" />
      </div>
      <div class="screenshot">
        <h3>Focus mode (选中模式)</h3>
        <img src="imgs/mx-wc-focus-mode.png" />
      </div>
      <div class="screenshot">
        <h3>Save/Archive (归档保存)</h3>
        <img src="imgs/mx-wc-archive.png" />
      </div>
      <div class="screenshot">
        <h3>Result (裁剪结果)</h3>
        <img src="imgs/mx-wc-preview.png" />
      </div>
      <div class="screenshot">
        <h3>History page (裁剪历史页)</h3>
        <img src="imgs/mx-wc-history.png" />
      </div>
    </div>
  </body>
</html>
