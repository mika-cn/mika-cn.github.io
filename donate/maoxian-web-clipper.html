<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donate To Developer</title>
    <style>
      body { margin: 0px }
      .alipay, .wechat {
        display: inline-block;
        padding: 30px 20px 40px 20px;
        height: 330px;
        color: #f5f5f5;
        margin-right: 15px;
        margin-bottom: 20px;
      }
      .alipay .mika, .wechat .mika{
        display: block;
        text-align: center;
        font-size: 18px;
        line-height: 22px;
      }
      .alipay .name, .wechat .name{
        display: block;
        font-size: 12px;
      }
      .alipay { background: #009EE7; }
      .wechat { background: #22AB38; }
      .main {
        padding: 20px 20px 200px 20px;
        background-color: #666;
        color: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <h2>非常感谢您的捐赠</h2>
      <h2>MaoXian Web Clipper</h2>
      <div class="qr-code">
        <div class="alipay">
          <label class="name">Alipay</label><br />
          <img src="./img/qr-alipay-rect.png" width="260px"/><br />
          <br />
          <label class="mika">Mika</label>
        </div>
        <div class="wechat">
          <label class="name">WechatPay</label><br />
          <img src="./img/qr-wechat-rect.png" width="260px"/><br />
          <br />
          <label class="mika">Mika</label>
        </div>
      </div>
    </div>
  </body>
</html>
