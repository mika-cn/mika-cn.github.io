<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Home page of mika">
    <title>Mika's Home</title>
  </head>
  <style>
    body {margin: 0px;}
    .main{
      padding: 60px 20px 200px 20px;
      width: 100%;
      min-height: 800px;
      background: linear-gradient(to right, #A7D5EA, pink);
      box-sizing: border-box;
    }
    .projects {}
    .clearfix:after {
      content: "";
      display: table;
      clear: both;
    }
    .project {
      text-decoration: none;
      display: inline-block;
      background-color: white;
      color: #586069;
      width: 280px;
      min-height: 126px;
      padding: 18px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 3px;
      cursor: pointer;
      margin-right: 20px;
      float: left;
    }
    .project:hover {
      box-shadow: 0 0 6px gray;
    }
    .project > .name {
      font-size: 15px;
      color: #0366d6
    }
    .project > .fake-logo {
      width: 30px;
      height: 30px;
    }

  </style>

  <body>
    <!-- refactor Me -->
    <div class="main">
      <div class="projects">
        <a class="project" href="/maoxian-web-clipper/index.html">
          <img class="logo" src="/maoxian-web-clipper/imgs/logo.png" />
          <h1 class="name">MaoXian Web Clipper</h1>
          <div class="intro">
             一个可以裁剪网页到本地的简洁浏览器扩展
          </div>
        </a>
        <a class="project" href="/blog/index.html">
          <div class="fake-logo"></div>
          <h1 class="name">Mika's Blog</h1>
          <div class="intro">
             我的博客 :)
          </div>
        </a>
      </div>
      <div class="clearfix"></div>
    </div>

  </body>
</html>
